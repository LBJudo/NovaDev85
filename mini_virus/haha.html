<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulation</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #000; height: 100vh; 
            cursor: crosshair;
        }
        .fake-window {
            position: absolute; width: 200px; height: 80px;
            background: #f0f0f0; border: 1px solid #000;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            font-family: sans-serif; font-size: 12px; z-index: 1000;
        }
        .header { 
            background: #004a99; color: white; padding: 3px; 
            display: flex; justify-content: space-between; font-weight: bold;
        }
        .close-btn { 
            cursor: pointer; background: #d00; padding: 0 5px; color: white; border: 1px solid #fff;
        }
    </style>
</head>
<body>
    <script>
        function createRandomWindow() {
            const win = document.createElement('div');
            win.className = 'fake-window';
            
            // Position aléatoire
            const randomX = Math.floor(Math.random() * (window.innerWidth - 200));
            const randomY = Math.floor(Math.random() * (window.innerHeight - 80));
            
            win.style.left = randomX + 'px';
            win.style.top = randomY + 'px';
            
            win.innerHTML = `
                <div class="header">
                    <span>ERREUR</span>
                    <span class="close-btn" onclick="this.parentElement.parentElement.remove()">X</span>
                </div>
                <div style="padding: 5px;">Système surchargé<br>Stack Overflow...</div>
            `;
            document.body.appendChild(win);
        }
        
        // Lance la création des popups toutes les 100ms
        setInterval(createRandomWindow, 100);
    </script>
</body>
</html>
